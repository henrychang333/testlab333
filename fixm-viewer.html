<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<!-- ver: 20260418 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIXM / FF-ICE XML 檢視器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .tag { font-family: monospace; font-size: 0.75rem; color: #6b7280; background: #f3f4f6; padding: 2px 6px; border-radius: 4px; }
        .full-path { font-family: monospace; font-size: 0.78rem; color: #64748b; word-break: break-all; overflow-wrap: break-word; line-height: 1.35; }
        .eobt-date { font-size: 1.45rem; font-weight: 700; color: #1f2937; }
        .eobt-time { font-size: 1.2rem; color: #4f46e5; font-weight: 500; }
        .duration-readable { font-size: 1.45rem; font-weight: 700; color: #4f46e5; }
        .duration-original { font-size: 0.82rem; color: #6b7280; }
        .field-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        table th, table td { text-align: left; vertical-align: top; }
        .point4d { font-size: 0.85rem; line-height: 1.4; }
    </style>
</head>
<body class="bg-gray-50 py-8">
    <div class="max-w-7xl mx-auto px-4">
        <div class="bg-white rounded-3xl shadow-xl p-8">
            <h1 class="text-3xl font-bold text-center mb-8 text-indigo-700">
                FIXM / FF-ICE XML 檢視器
            </h1>

            <div class="border-2 border-dashed border-indigo-300 rounded-2xl p-10 text-center mb-10 hover:border-indigo-500">
                <input type="file" id="fileInput" accept=".xml" class="hidden" onchange="handleFile(this)">
                <label for="fileInput" class="cursor-pointer">
                    <div class="text-6xl mb-4">📤</div>
                    <p class="text-xl font-medium">點擊上傳 FF-ICE XML 檔案</p>
                </label>
            </div>

            <div id="result" class="hidden space-y-12">

                <div id="headerInfo" class="bg-gradient-to-r from-indigo-50 to-blue-50 p-6 rounded-2xl"></div>

                <div id="flightInfo" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

                <div>
                    <h2 class="text-2xl font-semibold mb-4">🛫 航路元素（含 point4D）</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm" id="routeTable">
                            <thead>
                                <tr class="bg-gray-100">
                                    <th class="w-12">序號</th>
                                    <th>起點</th>
                                    <th>距離 (m)</th>
                                    <th>航路設計</th>
                                    <th class="w-80">Point4D 詳細資訊</th>
                                </tr>
                            </thead>
                            <tbody id="routeBody" class="divide-y"></tbody>
                        </table>
                    </div>
                </div>

                <div>
                    <h2 class="text-2xl font-semibold mb-4">🌳 完整 XML 樹狀結構</h2>
                    <div id="xmlTree" class="bg-gray-900 text-gray-100 p-6 rounded-2xl text-sm overflow-auto max-h-[650px] font-mono border border-gray-700"></div>
                </div>

                <div class="text-center pt-6">
                    <button onclick="resetPage()" class="px-8 py-3 bg-gray-200 hover:bg-gray-300 rounded-xl font-medium">
                        上傳另一個檔案
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleFile(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => parseFFICEXML(e.target.result);
            reader.readAsText(file);
        }

        function parseFFICEXML(xmlText) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(xmlText, "text/xml");

            let msgType = xml.querySelector("type, messageType")?.textContent || xml.documentElement.tagName || "Unknown";
            document.getElementById("headerInfo").innerHTML = `
                <div class="flex items-center gap-4">
                    <span class="text-4xl">📋</span>
                    <div>
                        <div class="tag">FF-ICE Message</div>
                        <div class="text-3xl font-bold text-indigo-700">${msgType}</div>
                    </div>
                </div>
            `;

            renderAllFlightFields(xml);
            renderRouteTable(xml);
            renderXMLTree(xml.documentElement, document.getElementById("xmlTree"));

            document.getElementById("result").classList.remove("hidden");
        }

        function renderAllFlightFields(doc) {
            const container = document.getElementById("flightInfo");
            container.innerHTML = "";
            const fields = collectAllFields(doc.documentElement);

            fields.forEach(field => {
                const div = document.createElement("div");
                div.className = "bg-gray-50 p-6 rounded-2xl field-card";

                let displayValue = field.value;
                if (field.uom) {
                    displayValue += ` <span class="text-gray-500">(${field.uom})</span>`;
                }

                if (field.tag.toLowerCase().includes("estimatedoffblocktime")) {
                    const datePart = field.value.split('T')[0];
                    const timePart = field.value.split('T')[1]?.replace('Z', '') || '';
                    div.innerHTML = `
                        <div class="full-path">${field.fullPath}</div>
                        <div class="tag mt-1 mb-2">estimatedOffBlockTime</div>
                        <div class="text-sm text-gray-500">預計離場時間 (UTC)</div>
                        <div class="eobt-date mt-3">${datePart}</div>
                        <div class="eobt-time">${timePart} UTC</div>
                        <div class="duration-original mt-3">原始: ${field.value}</div>
                    `;
                } else if (field.tag.toLowerCase().includes("totalestimatedelapsedtime")) {
                    const readable = formatDuration(field.value);
                    div.innerHTML = `
                        <div class="full-path">${field.fullPath}</div>
                        <div class="tag mt-1 mb-2">totalEstimatedElapsedTime</div>
                        <div class="text-sm text-gray-500">總飛行時間</div>
                        <div class="duration-readable mt-2">${readable}</div>
                        <div class="duration-original mt-1">原始: ${field.value}</div>
                    `;
                } else {
                    const label = field.tag.replace(/([A-Z])/g, ' $1').trim();
                    div.innerHTML = `
                        <div class="full-path">${field.fullPath}</div>
                        <div class="tag mt-1 mb-2">${field.tag}</div>
                        <div class="text-sm text-gray-500">${label}</div>
                        <div class="mt-2 text-lg font-semibold">${displayValue}</div>
                    `;
                }
                container.appendChild(div);
            });
        }

        function collectAllFields(node, prefix = "", fields = []) {
            if (!node || node.nodeType !== 1) return fields;
            if (node.tagName === "routeTrajectoryGroup") return fields;

            const currentPath = prefix ? `${prefix}/${node.tagName}` : node.tagName;

            if (node.children.length === 0 && node.textContent.trim()) {
                const uom = node.getAttribute("uom");
                fields.push({
                    tag: node.tagName,
                    fullPath: currentPath,
                    value: node.textContent.trim(),
                    uom: uom
                });
            } else {
                Array.from(node.children).forEach(child => collectAllFields(child, currentPath, fields));
            }
            return fields;
        }

        function formatDuration(duration) {
            const match = duration.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
            if (!match) return duration;
            const h = parseInt(match[1]||0);
            const m = parseInt(match[2]||0);
            const s = parseInt(match[3]||0);
            let parts = [];
            if (h > 0) parts.push(h);
            if (m > 0 || h > 0) parts.push(m.toString().padStart(2,'0'));
            if (s > 0 || m > 0 || h > 0) parts.push(s.toString().padStart(2,'0'));
            return parts.join(':') || "00:00";
        }

        function renderRouteTable(doc) {
            const tbody = document.getElementById("routeBody");
            tbody.innerHTML = "";
            const elements = doc.querySelectorAll("element");

            elements.forEach(el => {
                const seq = el.getAttribute("seqNum") || "—";
                const dist = el.querySelector("alongRouteDistance")?.textContent || "—";
                const designator = el.querySelector("routeDesignatorToNextElement > *")?.textContent || "—";
                const pointValue = el.querySelector("locationIndicator, designator")?.textContent || "—";

                let point4dHTML = "—";
                const point4d = el.querySelector("point4D");
                if (point4d) {
                    const level = point4d.querySelector("altitude, flightLevel");
                    const levelVal = level ? level.textContent + (level.getAttribute("uom") ? ` (${level.getAttribute("uom")})` : "") : "—";
                    const pos = point4d.querySelector("pos")?.textContent || "—";
                    const time = point4d.querySelector("absoluteTime, relativeTimeFromInitialPredictionPoint")?.textContent || "—";

                    let met = "";
                    const metData = point4d.querySelector("metData");
                    if (metData) {
                        const temp = metData.querySelector("temperature");
                        if (temp) met += `🌡️ ${temp.textContent}${temp.getAttribute("uom") ? `(${temp.getAttribute("uom")})` : ''} `;
                    }

                    const prop = point4d.querySelector("pointProperty propertyType")?.textContent || "";

                    point4dHTML = `
                        <div class="point4d">
                            <div><strong>高度:</strong> ${levelVal}</div>
                            <div><strong>時間:</strong> ${time}</div>
                            <div><strong>座標:</strong> ${pos}</div>
                            ${met ? `<div class="mt-1">${met}</div>` : ''}
                            ${prop ? `<div class="text-amber-600 mt-1">${prop}</div>` : ''}
                        </div>
                    `;
                }

                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td class="font-medium">${seq}</td>
                    <td class="font-medium">${pointValue}</td>
                    <td>${dist}</td>
                    <td>${designator}</td>
                    <td>${point4dHTML}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderXMLTree(node, container) {
            container.innerHTML = "";
            container.appendChild(createTreeNode(node));
        }

        function createTreeNode(node) {
            if (node.nodeType === Node.TEXT_NODE) {
                if (!node.textContent.trim()) return null;
                const d = document.createElement("div");
                d.className = "pl-6 text-emerald-400";
                d.textContent = node.textContent.trim();
                return d;
            }
            if (node.nodeType !== Node.ELEMENT_NODE) return null;

            const details = document.createElement("details");
            details.open = true;
            const summary = document.createElement("summary");
            summary.className = "flex items-center gap-2 text-blue-300 hover:text-blue-200";

            let attrText = "";
            if (node.attributes.length > 0) {
                attrText = Array.from(node.attributes).map(a => ` ${a.name}="${a.value}"`).join("");
            }

            summary.innerHTML = `<span class="font-bold text-violet-300">&lt;${node.tagName}${attrText}&gt;</span>`;
            details.appendChild(summary);

            const childContainer = document.createElement("div");
            childContainer.className = "border-l border-gray-700 pl-4 mt-1";
            let hasChild = false;
            node.childNodes.forEach(child => {
                const c = createTreeNode(child);
                if (c) {
                    childContainer.appendChild(c);
                    hasChild = true;
                }
            });
            if (hasChild) details.appendChild(childContainer);
            else if (node.textContent.trim()) {
                const val = document.createElement("div");
                val.className = "pl-6 text-emerald-400";
                val.textContent = node.textContent.trim();
                details.appendChild(val);
            }
            return details;
        }

        function resetPage() {
            document.getElementById("result").classList.add("hidden");
            document.getElementById("fileInput").value = "";
        }
    </script>
</body>
</html>
